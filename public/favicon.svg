<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Circular Space Ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#06b6d4" stroke-width="4" stroke-opacity="0.3" />
  <circle cx="50" cy="50" r="28" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-dasharray="6 3" stroke-opacity="0.5" />
  
  <!-- Shortcuts / Connections -->
  <line x1="50" y1="14" x2="81" y2="68" stroke="rgba(255,255,255,0.25)" stroke-width="2" />
  <line x1="81" y1="68" x2="19" y2="68" stroke="rgba(255,255,255,0.25)" stroke-width="2" />
  <line x1="19" y1="68" x2="50" y2="14" stroke="rgba(255,255,255,0.25)" stroke-width="2" />
  
  <line x1="50" y1="14" x2="50" y2="48" stroke="rgba(255,255,255,0.35)" stroke-width="2" />
  <line x1="81" y1="68" x2="50" y2="48" stroke="rgba(255,255,255,0.35)" stroke-width="2" />
  <line x1="19" y1="68" x2="50" y2="48" stroke="rgba(255,255,255,0.35)" stroke-width="2" />

  <!-- Nodes / Storage Stations -->
  <circle cx="50" cy="14" r="8" fill="#06b6d4" filter="drop-shadow(0 0 4px rgba(6, 182, 212, 0.6))" />
  <circle cx="81" cy="68" r="8" fill="#8b5cf6" filter="drop-shadow(0 0 4px rgba(139, 92, 246, 0.6))" />
  <circle cx="19" cy="68" r="8" fill="#8b5cf6" filter="drop-shadow(0 0 4px rgba(139, 92, 246, 0.6))" />
  <circle cx="50" cy="48" r="10" fill="#10b981" filter="drop-shadow(0 0 6px rgba(16, 185, 129, 0.8))" />
